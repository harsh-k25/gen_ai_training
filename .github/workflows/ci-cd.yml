name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        run: |
          pytest test_etl.py -v --tb=short

      - name: Run ETL pipeline (mock mode)
        run: |
          python etl.py

      - name: Verify output files
        run: |
          echo "=== Output files ==="
          ls -la output/
          echo "=== dim_customers ==="
          head -5 output/dim_customers.csv
          echo "=== dim_products ==="
          head -5 output/dim_products.csv
          echo "=== fact_orders ==="
          head -5 output/fact_orders.csv
          echo "=== fact_orders_summary ==="
          cat output/fact_orders_summary.csv

      - name: Run test coverage
        if: matrix.python-version == '3.11'
        run: |
          pip install coverage
          coverage run -m pytest test_etl.py -v
          coverage report --show-missing

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Snowflake config from secrets
        run: |
          cat > snowflake_config.json <<EOF
          {
            "account": "${{ secrets.SNOWFLAKE_ACCOUNT }}",
            "user": "${{ secrets.SNOWFLAKE_USER }}",
            "password": "${{ secrets.SNOWFLAKE_PASSWORD }}",
            "database": "${{ secrets.SNOWFLAKE_DATABASE }}",
            "schema": "${{ secrets.SNOWFLAKE_SCHEMA }}",
            "warehouse": "${{ secrets.SNOWFLAKE_WAREHOUSE }}",
            "role": "${{ secrets.SNOWFLAKE_ROLE }}",
            "tables": {
              "dim_customers": "dim_customers",
              "dim_products": "dim_products",
              "fact_orders": "fact_orders",
              "fact_orders_summary": "fact_orders_summary"
            }
          }
          EOF

      - name: Setup Snowflake schema & tables
        run: |
          echo "Creating database, schema, and tables in Snowflake..."
          python snowflake_setup.py --config snowflake_config.json

      - name: Run ETL pipeline to Snowflake
        run: |
          echo "Running full ETL pipeline with Snowflake target..."
          python etl.py --snowflake

      - name: Cleanup secrets
        if: always()
        run: |
          rm -f snowflake_config.json
