name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linting
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        run: |
          pytest test_etl.py -v --tb=short

      - name: Run ETL pipeline (mock mode)
        run: |
          python etl.py

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        run: |
          pip install coverage
          coverage run -m pytest test_etl.py
          coverage report

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Snowflake config from secrets
        run: |
          cat > snowflake_config.json <<EOF
          {
            "account": "${{ secrets.SNOWFLAKE_ACCOUNT }}",
            "user": "${{ secrets.SNOWFLAKE_USER }}",
            "password": "${{ secrets.SNOWFLAKE_PASSWORD }}",
            "database": "${{ secrets.SNOWFLAKE_DATABASE }}",
            "schema": "${{ secrets.SNOWFLAKE_SCHEMA }}",
            "warehouse": "${{ secrets.SNOWFLAKE_WAREHOUSE }}",
            "role": "${{ secrets.SNOWFLAKE_ROLE }}",
            "table": "orders_summary"
          }
          EOF

      - name: Run ETL to Snowflake
        run: |
          python etl.py --snowflake
