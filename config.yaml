# ETL Pipeline Configuration

# --- Source files ---
orders_file: orders.json
customers_file: customers.csv
products_file: products.csv
order_items_file: order_items.csv

# --- Output directory (mock/CSV mode) ---
output_dir: output/

# --- Validations ---
valid_regions:
  - US
  - EU
  - APAC
  - LATAM
  - EMEA

# --- Logging ---
logging:
  level: INFO

# --- Snowflake target schema & tables ---
snowflake:
  config_file: snowflake_config.json
  tables:
    dim_customers: dim_customers
    dim_products: dim_products
    fact_orders: fact_orders
    fact_orders_summary: fact_orders_summary
